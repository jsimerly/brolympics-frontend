# Frontend CI: vitest + a production build on every push and PR.
# Cloud Build only runs on main pushes (which DEPLOY) -- this is the only
# pre-deploy safety net for branch work. Check `gh run list` after pushes.
name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24 = npm 11, the SAME major that writes our package-lock locally.
          # npm 10 rejects npm-11 locks ("missing X from lock file"), and an
          # npm-10 lock written on Windows drops the Linux rollup binaries
          # (npm/cli#4828) and breaks this job AND the Docker deploy build.
          # If you regenerate the lock, do it with npm 11.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
